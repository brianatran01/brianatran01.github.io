  <path d="M76 165 Q68 190 76 208" stroke="#C9A67E" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M76 165 Q68 190 76 208" stroke="#2B2B2B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M124 165 Q132 190 124 208" stroke="#C9A67E" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M124 165 Q132 190 124 208" stroke="#2B2B2B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M70 207 l-3 -5 M76 209 l0 -6 M82 207 l3 -5" stroke="#2B2B2B" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M118 207 l-3 -5 M124 209 l0 -6 M130 207 l3 -5" stroke="#2B2B2B" stroke-width="1.4" stroke-linecap="round"/>
