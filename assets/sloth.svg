<svg viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- branch -->
  <path d="M10 30 Q100 14 190 32" stroke="#C8A578" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M10 30 Q100 14 190 32" stroke="#2B2B2B" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- leaves -->
  <path d="M35 24 q-10 -12 -22 -6 q6 12 22 6 Z" fill="#B7C4A8" stroke="#2B2B2B" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M170 26 q10 -12 22 -4 q-8 12 -22 4 Z" fill="#B7C4A8" stroke="#2B2B2B" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- arms wrapping branch -->
  <path d="M72 55 Q60 34 82 24 Q92 20 96 30" stroke="#B99A72" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M72 55 Q60 34 82 24 Q92 20 96 30" stroke="#2B2B2B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M128 55 Q140 34 118 24 Q108 20 104 30" stroke="#B99A72" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M128 55 Q140 34 118 24 Q108 20 104 30" stroke="#2B2B2B" stroke-width="2.2" fill="none" stroke-linecap="round"/>

