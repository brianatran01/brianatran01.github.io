  <!-- face patch -->
  <ellipse cx="100" cy="105" rx="30" ry="26" fill="#F0E2C9" stroke="#2B2B2B" stroke-width="2.2"/>

  <!-- eye patches -->
  <ellipse cx="86" cy="100" rx="9" ry="7" fill="#B99A72" opacity="0.55"/>
  <ellipse cx="114" cy="100" rx="9" ry="7" fill="#B99A72" opacity="0.55"/>

  <!-- sleepy closed eyes -->
  <path d="M80 100 q6 5 12 0" stroke="#2B2B2B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M108 100 q6 5 12 0" stroke="#2B2B2B" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- nose & sleepy smile -->
  <ellipse cx="100" cy="113" rx="5" ry="3.6" fill="#2B2B2B"/>
  <path d="M100 117 Q92 126 84 120" stroke="#2B2B2B" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M100 117 Q108 126 116 120" stroke="#2B2B2B" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- little zzz -->
  <text x="138" y="70" font-family="serif" font-size="14" fill="#2B2B2B" opacity="0.55">z</text>
  <text x="150" y="58" font-family="serif" font-size="10" fill="#2B2B2B" opacity="0.45">z</text>

  <!-- sage fur flecks -->
  <circle cx="72" cy="140" r="3" fill="#B7C4A8" opacity="0.8"/>
  <circle cx="130" cy="150" r="2.4" fill="#B7C4A8" opacity="0.8"/>
  <circle cx="118" cy="165" r="2" fill="#B7C4A8" opacity="0.7"/>

