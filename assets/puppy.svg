<svg viewBox="0 0 200 215" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- LEFT EAR: floppy, hangs behind and beside head -->
  <path d="M 54 48 Q 18 68 18 110 Q 18 140 50 138 Q 68 134 70 105 Q 70 68 54 48 Z"
        fill="#EFEFEF" stroke="#C2C2C2" stroke-width="2" stroke-linejoin="round"/>

  <!-- RIGHT EAR: mirrored -->
  <path d="M 146 48 Q 182 68 182 110 Q 182 140 150 138 Q 132 134 130 105 Q 130 68 146 48 Z"
        fill="#EFEFEF" stroke="#C2C2C2" stroke-width="2" stroke-linejoin="round"/>

  <!-- BODY: compact chubby oval -->
  <ellipse cx="100" cy="170" rx="52" ry="45" fill="#FFFFFF" stroke="#C2C2C2" stroke-width="2"/>

  <!-- HEAD: big round, dominant feature -->
  <circle cx="100" cy="82" r="62" fill="#FFFFFF" stroke="#C2C2C2" stroke-width="2"/>

  <!-- EYES: large, round, simple -->
  <circle cx="79" cy="80" r="12" fill="#111111"/>
  <circle cx="121" cy="80" r="12" fill="#111111"/>
  <!-- eye shine -->
  <circle cx="84" cy="74" r="4.5" fill="#FFFFFF"/>
  <circle cx="126" cy="74" r="4.5" fill="#FFFFFF"/>
  <!-- tiny lower shine -->
  <circle cx="82" cy="86" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="124" cy="86" r="2" fill="#FFFFFF" opacity="0.6"/>

  <!-- NOSE: small, centered, round oval -->
  <ellipse cx="100" cy="101" rx="8" ry="6.5" fill="#111111"/>

  <!-- MOUTH: small happy curve -->
  <path d="M 93 109 Q 100 118 107 109" stroke="#111111" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- LEFT FOOT -->
  <ellipse cx="70" cy="207" rx="22" ry="11" fill="#FFFFFF" stroke="#C2C2C2" stroke-width="2"/>

  <!-- RIGHT FOOT -->
  <ellipse cx="118" cy="208" rx="22" ry="11" fill="#FFFFFF" stroke="#C2C2C2" stroke-width="2"/>

  <!-- SIDE PAW (right): pink pad visible -->
  <ellipse cx="153" cy="177" rx="19" ry="16" fill="#FFFFFF" stroke="#C2C2C2" stroke-width="2"/>
  <!-- pink pad -->
  <ellipse cx="154" cy="178" rx="10" ry="8.5" fill="#FFB8C8"/>
  <!-- toe beans -->
  <circle cx="144" cy="171" r="4" fill="#FFB8C8"/>
  <circle cx="154" cy="169" r="4" fill="#FFB8C8"/>
  <circle cx="163" cy="172" r="4" fill="#FFB8C8"/>

</svg>
